apiVersion: apps/v1
kind: Deployment
metadata:
  name: tritonserver
  labels:
    {{- include "fraud-detection.labels" . | nindent 4 }}
    {{- include "fraud-detection.selectorLabels" (dict "component" "tritonserver") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "fraud-detection.selectorLabels" (dict "component" "tritonserver") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fraud-detection.labels" . | nindent 8 }}
        {{- include "fraud-detection.selectorLabels" (dict "component" "tritonserver") | nindent 8 }}
    spec:
      {{- include "fraud-detection.nodeSelector" . | nindent 6 }}
      {{- include "fraud-detection.imagePullSecrets" . | nindent 6 }}
      {{- include "fraud-detection.podSecurityContext" . | nindent 6 }}
      # Init Container 1: Copies models from the read-only image to the shared volume
      initContainers:
      - name: model-loader
        image: "{{ .Values.global.imageRegistry }}/{{ .Values.images.tritonModels.repository }}:{{ .Values.images.tritonModels.tag }}"
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        {{- include "fraud-detection.containerSecurityContext" . | nindent 8 }}
        command: ["/bin/sh", "-c", "cp -r /models/* /model_repo/"]
        volumeMounts:
        - name: model-repo
          mountPath: /model_repo
      # Init Container 2: Pre-installs Python packages needed by model.py into a shared volume.
      # This is required because Triton's Python backend stub runs in an isolated subprocess
      # and may not inherit the system Python PATH from the pyt-python-py3 image.
      - name: pip-installer
        image: "{{ .Values.images.tritonBase.registry }}/{{ .Values.images.tritonBase.repository }}:{{ .Values.images.tritonBase.tag }}"
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        {{- include "fraud-detection.containerSecurityContext" . | nindent 8 }}
        command:
          - /bin/sh
          - -c
          - |
            pip install --target /extra-python torch captum matplotlib --no-cache-dir --quiet || \
            echo "WARNING: pip install failed, torch may already be available"
        env:
        - name: HOME
          value: /tmp
        volumeMounts:
        - name: extra-python
          mountPath: /extra-python

      containers:
      - name: tritonserver
        image: "{{ .Values.images.tritonBase.registry }}/{{ .Values.images.tritonBase.repository }}:{{ .Values.images.tritonBase.tag }}"
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        {{- include "fraud-detection.containerSecurityContext" . | nindent 8 }}
        command: ["tritonserver", "--model-repository=/model_repo", "--exit-timeout-secs=6000", "--http-port=8005", "--grpc-port=8006", "--metrics-port=8007"]
        env:
        - name: HOME
          value: /tmp
        # Expose the pip-installed packages to Triton's Python backend subprocess
        - name: PYTHONPATH
          value: /extra-python
        ports:
        - containerPort: 8005
          name: http
        - containerPort: 8006
          name: grpc
        - containerPort: 8007
          name: metrics
        volumeMounts:
        - name: model-repo
          mountPath: /model_repo
        resources:
          limits:
            nvidia.com/gpu: {{ .Values.gpu.tritonCount }}
        # startupProbe gives Triton time to load all models before liveness/readiness kick in.
        # 60 failures × 10s = up to 10 minutes for startup.
        startupProbe:
          httpGet:
            path: /v2/health/ready
            port: 8005
          failureThreshold: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /v2/health/ready
            port: 8005
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /v2/health/live
            port: 8005
          initialDelaySeconds: 10
          periodSeconds: 15
          failureThreshold: 3
      volumes:
      - name: model-repo
        emptyDir: {}
      - name: extra-python
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: tritonserver
  labels:
    {{- include "fraud-detection.labels" . | nindent 4 }}
spec:
  ports:
  - port: 8005
    targetPort: 8005
    name: http
  - port: 8006
    targetPort: 8006
    name: grpc
  selector:
    {{- include "fraud-detection.selectorLabels" (dict "component" "tritonserver") | nindent 4 }}
