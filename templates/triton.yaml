apiVersion: apps/v1
kind: Deployment
metadata:
  name: tritonserver
  labels:
    {{- include "fraud-detection.labels" . | nindent 4 }}
    {{- include "fraud-detection.selectorLabels" (dict "component" "tritonserver") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "fraud-detection.selectorLabels" (dict "component" "tritonserver") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fraud-detection.labels" . | nindent 8 }}
        {{- include "fraud-detection.selectorLabels" (dict "component" "tritonserver") | nindent 8 }}
    spec:
      {{- include "fraud-detection.nodeSelector" . | nindent 6 }}
      {{- include "fraud-detection.imagePullSecrets" . | nindent 6 }}
      {{- include "fraud-detection.podSecurityContext" . | nindent 6 }}
      # Init Container: Copies models from the read-only image to the shared volume
      initContainers:
      - name: model-loader
        image: "{{ .Values.global.imageRegistry }}/{{ .Values.images.tritonModels.repository }}:{{ .Values.images.tritonModels.tag }}"
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        {{- include "fraud-detection.containerSecurityContext" . | nindent 8 }}
        command: ["/bin/sh", "-c", "cp -r /models/* /model_repo/"]
        volumeMounts:
        - name: model-repo
          mountPath: /model_repo

      containers:
      - name: tritonserver
        image: "{{ .Values.global.imageRegistry }}/{{ .Values.images.tritonBase.repository }}:{{ .Values.images.tritonBase.tag }}"
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        {{- include "fraud-detection.containerSecurityContext" . | nindent 8 }}
        command: ["tritonserver", "--model-repository=/model_repo", "--exit-timeout-secs=6000", "--http-port=8005", "--grpc-port=8006", "--metrics-port=8007"]
        env:
        - name: HOME
          value: /tmp
        ports:
        - containerPort: 8005
          name: http
        - containerPort: 8006
          name: grpc
        - containerPort: 8007
          name: metrics
        volumeMounts:
        - name: model-repo
          mountPath: /model_repo
        resources:
          limits:
            nvidia.com/gpu: {{ .Values.gpu.tritonCount }}
        readinessProbe:
          httpGet:
            path: /v2/health/ready
            port: 8005
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /v2/health/live
            port: 8005
          initialDelaySeconds: 60
          periodSeconds: 15
      volumes:
      - name: model-repo
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: tritonserver
  labels:
    {{- include "fraud-detection.labels" . | nindent 4 }}
spec:
  ports:
  - port: 8005
    targetPort: 8005
    name: http
  - port: 8006
    targetPort: 8006
    name: grpc
  selector:
    {{- include "fraud-detection.selectorLabels" (dict "component" "tritonserver") | nindent 4 }}
