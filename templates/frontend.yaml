apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    {{- include "fraud-detection.labels" . | nindent 4 }}
    {{- include "fraud-detection.selectorLabels" (dict "component" "frontend") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "fraud-detection.selectorLabels" (dict "component" "frontend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fraud-detection.labels" . | nindent 8 }}
        {{- include "fraud-detection.selectorLabels" (dict "component" "frontend") | nindent 8 }}
    spec:
      {{- include "fraud-detection.imagePullSecrets" . | nindent 6 }}
      {{- include "fraud-detection.podSecurityContext" . | nindent 6 }}
      containers:
      - name: frontend
        image: "{{ .Values.global.imageRegistry }}/{{ .Values.images.frontend.repository }}:{{ .Values.images.frontend.tag }}"
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        {{- include "fraud-detection.containerSecurityContext" . | nindent 8 }}
        ports:
        - containerPort: 3000
        command: ["/bin/sh", "-c"]
        args: ["find .next -name '*.json' -exec sed -i 's/customer_service/customer-service/g' {} + && npm start"]
        env:
        - name: CUSTOMER_SERVICE_URL
          value: "http://customer-service:5000"
        - name: NEXT_PUBLIC_CUSTOMER_SERVICE_URL
          value: "http://customer-service:5000"
        - name: CUSTOMER_SERVICE_HOST
          value: "customer-service"
        readinessProbe:
          tcpSocket:
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    {{- include "fraud-detection.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: 3000
    targetPort: 3000
  selector:
    {{- include "fraud-detection.selectorLabels" (dict "component" "frontend") | nindent 4 }}
